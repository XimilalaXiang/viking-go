metadata:
  id: "compression.field_compress"
  name: "Field Content Compression"
  description: "Compress field content to fit within max_length while preserving key information"
  version: "1.0.0"
  language: "en"
  category: "compression"

variables:
  - name: "field_name"
    type: "string"
    description: "Name of the field to compress"
    required: true
  - name: "content"
    type: "string"
    description: "Content to compress"
    required: true
  - name: "max_length"
    type: "int"
    description: "Maximum character length"
    required: true

template: |
  Compress the following field content to fit within {{.max_length}} characters while preserving key information.

  Field: {{.field_name}}
  Content: {{.content}}

  Return only the compressed text, no JSON wrapper.

llm_config:
  temperature: 0.0
