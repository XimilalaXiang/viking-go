memory_type: events
description: "Time-bound activities and decisions"
directory: "viking://user/{{.user}}/memories/events"
filename_template: "{{.abstract_slug}}.md"
enabled: true
content_template: |
  {{.content}}

fields:
  - name: abstract_slug
    type: string
    description: "URL-safe slug derived from abstract"
    merge_op: immutable
  - name: content
    type: string
    description: "Full event content"
    merge_op: patch
