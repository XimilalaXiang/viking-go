memory_type: entities
description: "Named entities with attributes (people, projects, organizations)"
directory: "viking://user/{{.user}}/memories/entities"
filename_template: "{{.abstract_slug}}.md"
enabled: true
content_template: |
  {{.content}}

fields:
  - name: abstract_slug
    type: string
    description: "URL-safe slug derived from abstract"
    merge_op: immutable
  - name: content
    type: string
    description: "Full entity content"
    merge_op: patch
