memory_type: cases
description: "Problem-solution cases"
directory: "viking://user/{{.user}}/memories/cases"
filename_template: "{{.abstract_slug}}.md"
enabled: true
content_template: |
  {{.content}}

fields:
  - name: abstract_slug
    type: string
    description: "URL-safe slug derived from abstract"
    merge_op: immutable
  - name: content
    type: string
    description: "Full case content"
    merge_op: patch
