memory_type: profile
description: "User identity and static attributes"
directory: "viking://user/{{.user}}/memories/profile"
filename_template: "{{.abstract_slug}}.md"
enabled: true
content_template: |
  {{.content}}

fields:
  - name: abstract_slug
    type: string
    description: "URL-safe slug derived from abstract"
    merge_op: immutable
  - name: content
    type: string
    description: "Full profile content"
    merge_op: patch
