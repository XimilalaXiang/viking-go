<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viking 控制台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#181a24;--border:#2a2d3a;--text:#e1e4ed;--muted:#8b8fa3;--primary:#6366f1;--primary-hover:#818cf8;--success:#22c55e;--warn:#f59e0b;--danger:#ef4444;--radius:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:var(--primary);text-decoration:none}
a:hover{color:var(--primary-hover)}
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:56px 1fr;height:100vh}
.header{grid-column:1/-1;display:flex;align-items:center;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);gap:16px}
.header h1{font-size:16px;font-weight:600;color:var(--text)}
.header .badge{font-size:11px;padding:2px 8px;border-radius:12px;background:var(--primary);color:#fff}
.header .spacer{flex:1}
.header .status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.header .dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
.header .dot.error{background:var(--danger)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto}
.sidebar .section{padding:0 16px;margin-bottom:8px}
.sidebar .section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.sidebar .nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-radius:var(--radius);margin:2px 8px;transition:all .15s}
.sidebar .nav-item:hover{color:var(--text);background:rgba(99,102,241,.08)}
.sidebar .nav-item.active{color:var(--primary);background:rgba(99,102,241,.12)}
.sidebar .nav-item svg{width:16px;height:16px;flex-shrink:0}
.main{padding:24px;overflow-y:auto}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.panel h2{font-size:15px;font-weight:600;margin-bottom:12px}
.panel h3{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.stat{text-align:center}
.stat .value{font-size:28px;font-weight:700;color:var(--primary)}
.stat .label{font-size:12px;color:var(--muted);margin-top:2px}
.health-card{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius)}
.health-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.health-dot.ok{background:var(--success)}
.health-dot.warn{background:var(--warn)}
.health-dot.err{background:var(--danger)}
.health-card .info{flex:1}
.health-card .info .name{font-size:13px;font-weight:600}
.health-card .info .status{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
.file-list{list-style:none}
.file-list li{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.file-list li:last-child{border-bottom:none}
.icon-dir{color:var(--warn)}
.icon-file{color:var(--muted)}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:13px;margin-bottom:12px;flex-wrap:wrap}
.breadcrumb span{color:var(--muted);cursor:pointer}
.breadcrumb span:hover{color:var(--text)}
.breadcrumb span.current{color:var(--text);font-weight:600}
input[type=text],textarea{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px}
input:focus,textarea:focus{outline:none;border-color:var(--primary)}
.btn{padding:6px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1}
.content-view{background:var(--bg);padding:16px;border-radius:var(--radius);font-family:'SF Mono',Menlo,monospace;font-size:13px;white-space:pre-wrap;max-height:600px;overflow-y:auto;border:1px solid var(--border)}
.tab-bar{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted)}
@media(max-width:768px){.app{grid-template-columns:1fr}.sidebar{display:none}.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>Viking 控制台</h1>
    <span class="badge">Go</span>
    <div class="spacer"></div>
    <div class="status"><span class="dot" id="health-dot"></span><span id="health-text">连接中...</span></div>
    <button class="btn" id="logout-btn" style="display:none;font-size:12px;padding:4px 12px" onclick="doLogout()">退出登录</button>
  </div>
  <div class="sidebar">
    <div class="section"><div class="section-label">概览</div></div>
    <div class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      仪表盘
    </div>
    <div class="section" style="margin-top:12px"><div class="section-label">数据</div></div>
    <div class="nav-item" data-view="files" onclick="switchView('files')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      文件浏览
    </div>
    <div class="nav-item" data-view="search" onclick="switchView('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      搜索
    </div>
    <div class="nav-item" data-view="vectors" onclick="switchView('vectors')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      向量库
    </div>
    <div class="section" style="margin-top:12px"><div class="section-label">系统</div></div>
    <div class="nav-item" data-view="observer" onclick="switchView('observer')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      监控
    </div>
    <div class="nav-item" data-view="tasks" onclick="switchView('tasks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      任务
    </div>
  </div>
  <div class="main" id="main-content">
    <div class="loading">加载中...</div>
  </div>
</div>

<script>
const API = '/console/api/v1';
let currentView = 'dashboard';
let currentPath = '';
let currentUri = 'viking://';

async function api(path, opts = {}) {
  const url = API + path;
  const resp = await fetch(url, { ...opts, headers: { 'Content-Type': 'application/json', ...opts.headers } });
  if (resp.status === 401) { window.location.reload(); return {}; }
  return resp.json();
}

async function checkAuthStatus() {
  try {
    const data = await fetch(API + '/auth/status').then(r => r.json());
    if (data.auth_required) {
      document.getElementById('logout-btn').style.display = '';
    }
  } catch {}
}

async function doLogout() {
  await fetch(API + '/auth/logout', { method: 'POST' });
  window.location.reload();
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  render();
}

async function checkHealth() {
  try {
    const d = await api('/ov/debug/health');
    const dot = document.getElementById('health-dot');
    const txt = document.getElementById('health-text');
    if (d.status === 'ok') {
      dot.className = 'dot'; txt.textContent = '运行正常';
    } else {
      dot.className = 'dot error'; txt.textContent = '异常';
    }
  } catch {
    document.getElementById('health-dot').className = 'dot error';
    document.getElementById('health-text').textContent = '离线';
  }
}

async function render() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading">加载中...</div>';

  try {
    switch (currentView) {
      case 'dashboard': await renderDashboard(el); break;
      case 'files': await renderFiles(el); break;
      case 'search': renderSearch(el); break;
      case 'vectors': await renderVectors(el); break;
      case 'observer': await renderObserver(el); break;
      case 'tasks': await renderTasks(el); break;
    }
  } catch (e) {
    el.innerHTML = `<div class="panel"><h2>错误</h2><p>${e.message}</p></div>`;
  }
}

async function renderDashboard(el) {
  const [sys, mem, vec] = await Promise.all([
    api('/ov/observer/system').catch(() => null),
    api('/ov/stats/memories').catch(() => null),
    api('/ov/debug/vector/count').catch(() => null),
  ]);

  let html = '<h2 style="margin-bottom:16px">仪表盘</h2>';

  const sysR = sys?.result || {};
  const uptime = sysR.uptime_seconds || 0;
  const memR = mem?.result || {};
  const vecR = vec?.result || {};

  html += '<div class="grid-3">';
  html += `<div class="panel stat"><div class="value">${formatUptime(uptime)}</div><div class="label">运行时间</div></div>`;
  html += `<div class="panel stat"><div class="value">${memR.total || 0}</div><div class="label">记忆条数</div></div>`;
  html += `<div class="panel stat"><div class="value">${vecR.count || 0}</div><div class="label">向量数</div></div>`;
  html += '</div>';

  const comps = sysR.components || {};
  html += '<div class="panel"><h3>组件状态</h3><div class="grid-3" style="margin-top:12px">';
  for (const [name, info] of Object.entries(comps)) {
    const dotClass = info.is_healthy ? 'ok' : 'err';
    const statusText = info.is_healthy ? '正常' : '异常';
    html += `<div class="health-card"><div class="health-dot ${dotClass}"></div><div class="info"><div class="name">${name}</div><div class="status">${info.status || statusText}</div></div></div>`;
  }
  html += '</div></div>';

  const rt = sysR.runtime || {};
  if (rt.goroutines) {
    html += '<div class="panel"><h3>运行时信息</h3><div class="grid-3" style="margin-top:12px">';
    html += `<div class="stat"><div class="value">${rt.goroutines}</div><div class="label">协程数</div></div>`;
    html += `<div class="stat"><div class="value">${formatBytes(rt.heap_alloc || 0)}</div><div class="label">堆内存</div></div>`;
    html += `<div class="stat"><div class="value">${rt.gc_cycles || 0}</div><div class="label">GC 次数</div></div>`;
    html += '</div></div>';
  }

  if (memR.by_category) {
    html += '<div class="panel"><h3>记忆分类</h3><table style="margin-top:8px"><tr><th>分类</th><th>数量</th></tr>';
    for (const [cat, cnt] of Object.entries(memR.by_category)) {
      html += `<tr><td>${cat}</td><td>${cnt}</td></tr>`;
    }
    html += '</table></div>';
  }

  el.innerHTML = html;
}

async function renderFiles(el) {
  const data = await api('/ov/fs/ls?uri=' + encodeURIComponent(currentUri));
  const entries = Array.isArray(data) ? data : (data?.result?.entries || data?.result || []);

  let html = '<h2 style="margin-bottom:16px">文件浏览</h2>';
  html += renderBreadcrumb(currentUri);
  html += '<div class="panel"><ul class="file-list">';

  if (currentUri !== 'viking://') {
    html += `<li><span class="icon-dir" style="cursor:pointer" onclick="navigateUp()">.. (上级目录)</span></li>`;
  }

  const sorted = [...entries].sort((a, b) => {
    const aDir = a.is_dir || a.isDir;
    const bDir = b.is_dir || b.isDir;
    if (aDir !== bDir) return aDir ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  for (const e of sorted) {
    const isDir = e.is_dir || e.isDir;
    const icon = isDir ? 'icon-dir' : 'icon-file';
    const symbol = isDir ? '📁' : '📄';
    const entryUri = e.uri || (currentUri.replace(/\/$/, '') + '/' + e.name);
    const onclick = isDir ? `onclick="navigateToUri('${escapeJS(entryUri)}')"` : `onclick="viewFile('${escapeJS(entryUri)}')"`;
    const size = e.size ? formatBytes(e.size) : '';
    html += `<li><span class="${icon}" style="cursor:pointer" ${onclick}>${symbol} ${escHtml(e.name)}</span><span style="margin-left:auto;color:var(--muted);font-size:12px">${size}</span></li>`;
  }

  if (sorted.length === 0) html += '<li class="empty">空目录</li>';
  html += '</ul></div>';
  el.innerHTML = html;
}

function renderSearch(el) {
  el.innerHTML = `
    <h2 style="margin-bottom:16px">搜索</h2>
    <div class="panel">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="输入搜索内容..." onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn btn-primary" onclick="doSearch()">搜索</button>
      </div>
      <div id="search-results"><div class="empty">输入关键词搜索记忆和资源</div></div>
    </div>`;
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const container = document.getElementById('search-results');
  container.innerHTML = '<div class="loading">搜索中...</div>';
  try {
    const data = await api('/ov/search/find', { method: 'POST', body: JSON.stringify({ query: q, limit: 20 }) });
    const results = data?.result?.results || data?.resources || data?.result || [];
    if (results.length === 0) {
      container.innerHTML = '<div class="empty">未找到结果</div>';
      return;
    }
    let html = '<table><tr><th>URI</th><th>类型</th><th>评分</th><th>摘要</th></tr>';
    for (const r of results) {
      html += `<tr><td>${escHtml(r.uri || r.id || '')}</td><td>${escHtml(r.context_type || '')}</td><td>${(r.score || 0).toFixed(3)}</td><td>${escHtml((r.abstract || '').slice(0, 80))}</td></tr>`;
    }
    html += '</table>';
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div class="empty">错误: ${e.message}</div>`;
  }
}

async function renderVectors(el) {
  const data = await api('/ov/debug/vector/scroll?limit=50');
  const records = data?.result?.records || [];

  let html = '<h2 style="margin-bottom:16px">向量库</h2>';
  html += '<div class="panel"><table><tr><th>ID</th><th>URI</th><th>类型</th><th>分类</th><th>更新时间</th></tr>';
  for (const r of records) {
    html += `<tr><td style="font-family:monospace;font-size:12px">${escHtml((r.id||'').slice(0,12))}</td><td>${escHtml(r.uri||'')}</td><td>${escHtml(r.context_type||'')}</td><td>${escHtml(r.category||'')}</td><td>${escHtml(r.updated_at||'')}</td></tr>`;
  }
  if (records.length === 0) html += '<tr><td colspan="5" class="empty">暂无向量数据</td></tr>';
  html += '</table></div>';
  el.innerHTML = html;
}

async function renderObserver(el) {
  const [queue, storage, models] = await Promise.all([
    api('/ov/observer/queue').catch(() => ({})),
    api('/ov/observer/storage').catch(() => ({})),
    api('/ov/observer/models').catch(() => ({})),
  ]);

  let html = '<h2 style="margin-bottom:16px">系统监控</h2><div class="grid-2">';

  const labels = {'Queue': '队列', 'Storage': '存储', 'Models': '模型'};
  for (const [label, data] of [['Queue', queue], ['Storage', storage], ['Models', models]]) {
    const r = data?.result || {};
    const dotClass = r.is_healthy ? 'ok' : (r.has_errors ? 'err' : 'warn');
    html += `<div class="panel"><div class="health-card" style="border:none;padding:0"><div class="health-dot ${dotClass}"></div><div class="info"><div class="name">${labels[label] || label}</div><div class="status">${r.status || '未知'}</div></div></div>`;
    if (r.details) {
      html += '<table style="margin-top:12px">';
      for (const [k, v] of Object.entries(r.details)) {
        html += `<tr><td style="color:var(--muted)">${escHtml(k)}</td><td>${typeof v === 'object' ? JSON.stringify(v) : escHtml(String(v))}</td></tr>`;
      }
      html += '</table>';
    }
    html += '</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

async function renderTasks(el) {
  const data = await api('/ov/tasks?limit=50');
  const tasks = data?.result || [];

  let html = '<h2 style="margin-bottom:16px">任务列表</h2><div class="panel">';
  html += '<table><tr><th>ID</th><th>类型</th><th>状态</th><th>创建时间</th></tr>';
  for (const t of tasks) {
    const statusColor = t.status === 'completed' ? 'var(--success)' : t.status === 'failed' ? 'var(--danger)' : t.status === 'running' ? 'var(--primary)' : 'var(--muted)';
    html += `<tr><td style="font-family:monospace;font-size:12px">${escHtml(t.id||'')}</td><td>${escHtml(t.type||'')}</td><td style="color:${statusColor}">${escHtml(t.status||'')}</td><td>${escHtml(t.created_at||'')}</td></tr>`;
  }
  if (tasks.length === 0) html += '<tr><td colspan="4" class="empty">暂无任务</td></tr>';
  html += '</table></div>';
  el.innerHTML = html;
}

async function viewFile(uri) {
  const el = document.getElementById('main-content');
  el.innerHTML = '<div class="loading">加载文件中...</div>';
  const displayName = uri.replace(/^viking:\/\//, '');
  try {
    const data = await api('/ov/content/read?uri=' + encodeURIComponent(uri));
    const content = data?.result?.content || data?.content || JSON.stringify(data, null, 2);
    el.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px"><button class="btn" onclick="switchView('files')">返回</button><h2>${escHtml(displayName)}</h2></div><div class="content-view">${escHtml(content)}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="panel"><h2>错误</h2><p>${e.message}</p><button class="btn" onclick="switchView('files')">返回</button></div>`;
  }
}

function navigateToUri(uri) {
  currentUri = uri;
  renderFiles(document.getElementById('main-content'));
}

function navigateUp() {
  const parts = currentUri.replace(/\/$/, '').split('/');
  parts.pop();
  currentUri = parts.join('/') || 'viking://';
  if (currentUri === 'viking:') currentUri = 'viking://';
  renderFiles(document.getElementById('main-content'));
}

function navigateToBreadcrumb(uri) {
  currentUri = uri;
  renderFiles(document.getElementById('main-content'));
}

function renderBreadcrumb(uri) {
  let html = '<div class="breadcrumb"><span onclick="currentUri=\'viking://\';renderFiles(document.getElementById(\'main-content\'))">根目录</span>';
  const stripped = uri.replace(/^viking:\/\//, '');
  if (stripped) {
    const parts = stripped.split('/');
    parts.forEach((p, i) => {
      html += ` / `;
      const partUri = 'viking://' + parts.slice(0, i + 1).join('/');
      if (i === parts.length - 1) {
        html += `<span class="current">${escHtml(p)}</span>`;
      } else {
        html += `<span onclick="navigateToBreadcrumb('${escapeJS(partUri)}')">${escHtml(p)}</span>`;
      }
    });
  }
  html += '</div>';
  return html;
}

function formatUptime(sec) {
  if (sec < 60) return sec + '秒';
  if (sec < 3600) return Math.floor(sec/60) + '分';
  if (sec < 86400) return Math.floor(sec/3600) + '时 ' + Math.floor((sec%3600)/60) + '分';
  return Math.floor(sec/86400) + '天 ' + Math.floor((sec%86400)/3600) + '时';
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024, sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeJS(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

checkAuthStatus();
checkHealth();
setInterval(checkHealth, 15000);
render();
</script>
</body>
</html>
